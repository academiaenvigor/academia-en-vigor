<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador · Academia En Vigor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
:root{--azul:#1d4ed8;--azul-osc:#1e3a8a;--verde:#16a34a;--verde-osc:#14532d;
  --tinta:#0f172a;--gris:#64748b;--linea:#e2e8f0;--crema:#f8fafc;--azulc:#dbeafe;--verdec:#dcfce7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;color:var(--tinta);background:var(--crema);display:flex;height:100vh;overflow:hidden}
/* Panel lateral */
aside{width:340px;background:#fff;border-right:2px solid var(--tinta);display:flex;flex-direction:column;overflow:hidden}
.cab{padding:14px 16px;border-bottom:2px solid var(--tinta)}
.cab h1{font-size:1.15rem;letter-spacing:1px}
.cab .sub{font-size:.72rem;color:var(--gris);font-style:italic}
.pulso{height:20px;width:100%;margin-top:6px}
.pulso polyline{fill:none;stroke:var(--verde);stroke-width:2;stroke-dasharray:400;stroke-dashoffset:400;animation:l 3s linear infinite}
@keyframes l{to{stroke-dashoffset:0}}
.nav{overflow-y:auto;flex:1;padding:8px}
.grupo{margin-bottom:6px}
.grupo>.tit{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris);padding:8px 8px 4px;font-weight:700}
.item{padding:7px 10px;border-radius:7px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:8px;transition:background .1s}
.item:hover{background:var(--crema)}
.item.activo{background:var(--azulc);color:var(--azul-osc);font-weight:600}
.item .ico{width:18px;text-align:center;flex-shrink:0}
.item .badge{margin-left:auto;font-size:.62rem;background:var(--verdec);color:var(--verde-osc);padding:1px 6px;border-radius:10px;font-weight:700}
.item .badge.q{background:#fef3c7;color:#92400e}
.subitem{padding-left:26px;font-size:.8rem}
/* Panel principal */
main{flex:1;overflow-y:auto;padding:0}
.top{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--linea);padding:12px 24px;z-index:5;display:flex;align-items:center;gap:12px}
.top .ruta{font-size:.8rem;color:var(--gris);font-family:monospace}
.cuerpo{padding:24px 32px;max-width:900px}
.bienvenida{text-align:center;padding:60px 20px;color:var(--gris)}
.bienvenida h2{font-size:1.6rem;color:var(--tinta);margin-bottom:10px}
.stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.stat{background:#fff;border:1.5px solid var(--linea);border-radius:10px;padding:14px 20px;min-width:120px}
.stat b{display:block;font-size:1.8rem;color:var(--azul)}
.stat span{font-size:.72rem;color:var(--gris);text-transform:uppercase;letter-spacing:.5px}
/* Markdown */
.md h1{font-size:1.7rem;border-bottom:3px solid var(--azul);padding-bottom:6px;margin:14px 0 10px}
.md h2{font-size:1.35rem;color:var(--azul-osc);margin:20px 0 8px}
.md h3{font-size:1.12rem;margin:14px 0 6px}
.md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:.9rem}
.md th{background:var(--azulc);text-align:left}.md th,.md td{border:1px solid var(--linea);padding:7px 10px}
.md blockquote{background:var(--verdec);border-left:5px solid var(--verde);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0}
.md code,.md pre{background:var(--crema);border-radius:6px;font-size:.85rem}
.md pre{padding:12px;overflow-x:auto;border:1px solid var(--linea)}
.md img{max-width:100%;border:1px solid var(--linea);border-radius:8px;margin:8px 0}
.md hr{border:none;border-top:1px solid var(--linea);margin:18px 0}
.cargando{padding:40px;text-align:center;color:var(--gris)}
/* Preguntas */
.preg{background:#fff;border:1.5px solid var(--linea);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.preg .num{font-size:.7rem;color:var(--gris);font-weight:700}
.preg .enun{font-weight:600;margin:6px 0 10px}
.opt{padding:6px 10px;border:1px solid var(--linea);border-radius:6px;margin-bottom:5px;font-size:.9rem;cursor:pointer}
.opt:hover{background:var(--crema)}
.opt.ok{background:var(--verdec);border-color:var(--verde)}
.expl{font-size:.82rem;color:var(--gris);margin-top:8px;padding-top:8px;border-top:1px dashed var(--linea)}
.tag{display:inline-block;font-size:.65rem;padding:1px 7px;border-radius:10px;margin-right:4px;background:var(--azulc);color:var(--azul-osc)}
.aviso{background:#fef3c7;color:#92400e;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px}
.json{background:var(--tinta);color:#e2e8f0;padding:16px;border-radius:8px;font-size:.78rem;overflow-x:auto;font-family:monospace;white-space:pre-wrap}
@media(max-width:800px){aside{width:100%;position:absolute;height:auto;max-height:45vh;z-index:10}main{margin-top:45vh}}
</style>
</head>
<body>
<aside>
  <div class="cab">
    <h1>🛡️ EXPLORADOR</h1>
    <div class="sub">Academia En Vigor · navegación interna</div>
    <svg class="pulso" viewBox="0 0 340 20" preserveAspectRatio="none"><polyline points="0,12 90,12 105,4 118,17 130,2 140,17 150,12 340,12"/></svg>
  </div>
  <div class="nav" id="nav"><div class="cargando">Cargando índice…</div></div>
</aside>
<main>
  <div class="top"><span class="ruta" id="ruta">Selecciona un elemento del panel</span></div>
  <div class="cuerpo" id="cuerpo">
    <div class="bienvenida">
      <h2>Explorador de contenido</h2>
      <p>Navega por el temario, los bancos de preguntas y los exámenes oficiales.<br>Todo se lee en directo desde el repositorio.</p>
      <div class="stats" id="stats"></div>
    </div>
  </div>
</main>

<script>
const RAW = 'https://raw.githubusercontent.com/academiaenvigor/academia-en-vigor/main/';
const OP = 'policia-nacional';

// Mapa de contenido conocido del repo (se amplía al añadir temas)
const TEMAS = {
  1: {slug:'tema-01-el-derecho-la-persona-y-la-nacionalidad', titulo:'El Derecho, la persona y la nacionalidad'},
  3: {slug:'tema-03-constitucion-espanola-ii', titulo:'Constitución Española II'},
};
const EXAMENES = [
  ['P33-XXXIII',33],['P34-XXXIV',34],['P35-XXXV',35],['P36-XXXVI',36],['P37-XXXVII',37],
  ['P38-XXXVIII',38],['P39-XXXIX',39],['P40-XL',40],['P41-XLI',41],['P42-XLII',42]
];

function construirNav(){
  const nav = document.getElementById('nav');
  let h = '';
  // Temas
  h += '<div class="grupo"><div class="tit">📖 Temas (VIGOR)</div>';
  for(const [n,t] of Object.entries(TEMAS)){
    h += `<div class="item" onclick="verTema(${n},'atestado',this)"><span class="ico">📚</span> Tema ${n} · El Atestado</div>`;
    h += `<div class="item" onclick="verTema(${n},'parte',this)"><span class="ico">📄</span> Tema ${n} · El Parte</div>`;
    h += `<div class="item subitem" onclick="verMaster(${n},this)"><span class="ico">🧠</span> master.md (fuente)</div>`;
    h += `<div class="item subitem" onclick="verBanco(${n},this)"><span class="ico">🎯</span> Banco de preguntas</div>`;
  }
  h += '</div>';
  // Exámenes oficiales
  h += '<div class="grupo"><div class="tit">📅 Exámenes oficiales</div>';
  for(const [id,n] of EXAMENES){
    h += `<div class="item" onclick="verExamen('${id}',this)"><span class="ico">📋</span> Promoción ${n} <span class="badge q">oficial</span></div>`;
  }
  h += '</div>';
  // Editorial
  h += '<div class="grupo"><div class="tit">⚙️ Editorial</div>';
  h += `<div class="item" onclick="verMd('editorial/00-codigo-vigor.md','Código VIGOR',this)"><span class="ico">📜</span> Código VIGOR</div>`;
  h += `<div class="item" onclick="verMd('README.md','README',this)"><span class="ico">📄</span> README</div>`;
  h += '</div>';
  nav.innerHTML = h;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><b>${Object.keys(TEMAS).length}</b><span>temas VIGOR</span></div>
    <div class="stat"><b>${EXAMENES.length}</b><span>exámenes oficiales</span></div>
    <div class="stat"><b>45</b><span>temas totales</span></div>`;
}

function activar(el){ document.querySelectorAll('.item').forEach(i=>i.classList.remove('activo')); if(el) el.classList.add('activo'); }
function ruta(t){ document.getElementById('ruta').textContent = t; }
function cargando(){ document.getElementById('cuerpo').innerHTML = '<div class="cargando">Cargando…</div>'; }

async function fetchTexto(path){
  const r = await fetch(RAW + path);
  if(!r.ok) throw new Error('No encontrado: '+path);
  return await r.text();
}

async function verTema(n, version, el){
  activar(el); cargando();
  const path = `temas/${OP}/${version}/${TEMAS[n].slug}.md`;
  ruta(path);
  try{
    let md = await fetchTexto(path);
    let html = marked.parse(md);
    html = html.replace(/\.\.\/\.\.\/\.\.\/assets\//g, RAW+'assets/').replace(/\.\.\/\.\.\/img\//g, RAW+'img/');
    document.getElementById('cuerpo').innerHTML = `<div class="md">${html}</div>`;
    document.querySelector('main').scrollTop = 0;
  }catch(e){ document.getElementById('cuerpo').innerHTML = `<div class="aviso">No se pudo cargar: ${path}</div>`; }
}

async function verMaster(n, el){
  activar(el); cargando();
  const path = `conocimiento/${OP}/tema-0${n}/master.md`;
  ruta(path);
  try{
    let md = await fetchTexto(path);
    document.getElementById('cuerpo').innerHTML = `<div class="aviso">🧠 Fuente única del tema (master.md). De aquí se generan El Parte y El Atestado.</div><div class="md">${marked.parse(md)}</div>`;
  }catch(e){ document.getElementById('cuerpo').innerHTML = `<div class="aviso">No disponible: ${path}</div>`; }
}

async function verBanco(n, el){
  activar(el); cargando();
  const path = `banco-preguntas/${OP}/tema-0${n}/preguntas.jsonl`;
  ruta(path);
  try{
    const txt = await fetchTexto(path);
    const preguntas = txt.trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));
    let h = `<h2 style="margin-bottom:12px">🎯 Banco · Tema ${n} <span style="font-size:.9rem;color:var(--gris)">(${preguntas.length} preguntas)</span></h2>`;
    preguntas.slice(0,40).forEach((p,i)=>{ h += pintarPregunta(p,i+1); });
    if(preguntas.length>40) h += `<p style="color:var(--gris);text-align:center">… y ${preguntas.length-40} más</p>`;
    document.getElementById('cuerpo').innerHTML = h;
  }catch(e){ document.getElementById('cuerpo').innerHTML = `<div class="aviso">No disponible: ${path}</div>`; }
}

async function verExamen(id, el){
  activar(el); cargando();
  const path = `banco-preguntas/${OP}/oficiales/${id}/preguntas.jsonl`;
  ruta(path);
  try{
    const meta = JSON.parse(await fetchTexto(`banco-preguntas/${OP}/oficiales/${id}/metadata.json`));
    const txt = await fetchTexto(path);
    const preguntas = txt.trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));
    let aviso = '';
    if(meta.verification_status==='quarantine' || meta.counts_for_ha_caido===false)
      aviso = `<div class="aviso">⚠️ Examen en cuarentena / respuestas sin cotejar contra plantilla oficial. No cuenta para el "Ha caído".</div>`;
    let h = `<h2>📋 Promoción ${meta.promotion_number} (${meta.promotion_roman}) · Modelo ${meta.model} · ${meta.series_year}</h2>
      <p style="color:var(--gris);margin:6px 0 14px">${meta.normalised_questions} preguntas · estado: ${meta.verification_status}</p>${aviso}`;
    preguntas.slice(0,30).forEach(p=>{ h += pintarPreguntaOficial(p); });
    if(preguntas.length>30) h += `<p style="color:var(--gris);text-align:center">… y ${preguntas.length-30} más</p>`;
    document.getElementById('cuerpo').innerHTML = h;
  }catch(e){ document.getElementById('cuerpo').innerHTML = `<div class="aviso">No disponible: ${path}</div>`; }
}

function pintarPregunta(p, i){
  const opts = (p.options||[]).map(o=>{
    const ok = (o.id===p.correct_option_id)?' ok':'';
    return `<div class="opt${ok}">${o.text||o.source_label}</div>`;
  }).join('');
  const tags = [p.difficulty, p.type, p.concept].filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join('');
  return `<div class="preg"><div class="num">Pregunta ${i}</div><div>${tags}</div>
    <div class="enun">${p.prompt||''}</div>${opts}
    ${p.explanation?`<div class="expl">💡 ${p.explanation}</div>`:''}</div>`;
}
function pintarPreguntaOficial(p){
  const correcta = p.answer?.proposed_option_id || p.correct_option_id;
  const opts = (p.options||[]).map(o=>{
    const ok = (o.id===correcta)?' ok':'';
    return `<div class="opt${ok}"><b>${o.source_label})</b> ${o.text}</div>`;
  }).join('');
  const nq = p.exam?.question_number || '';
  return `<div class="preg"><div class="num">Pregunta ${nq}</div>
    <div class="enun">${p.prompt||''}</div>${opts}</div>`;
}

async function verMd(path, titulo, el){
  activar(el); cargando(); ruta(path);
  try{
    const md = await fetchTexto(path);
    document.getElementById('cuerpo').innerHTML = `<div class="md">${marked.parse(md)}</div>`;
  }catch(e){ document.getElementById('cuerpo').innerHTML = `<div class="aviso">No disponible: ${path}</div>`; }
}

construirNav();
</script>
</body>
</html>
