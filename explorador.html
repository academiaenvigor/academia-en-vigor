<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorador · Academia En Vigor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
:root{
  --azul:#1d4ed8;--azul-osc:#1e3a8a;--verde:#16a34a;--verde-osc:#14532d;
  --tinta:#0f172a;--gris:#64748b;--linea:#e2e8f0;--crema:#f8fafc;
  --azulc:#eff6ff;--verdec:#f0fdf4;--amarilloc:#fffbeb;--morado:#9333ea;
  --moradoc:#faf5ff;--rojo:#dc2626;--rojoc:#fef2f2;--naranja:#ea580c;
  --naranjac:#fff7ed;--visual:#64748b;--visualc:#f8fafc;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;color:var(--tinta);background:var(--crema);display:flex;height:100vh;overflow:hidden}
body>aside{width:340px;background:#fff;border-right:2px solid var(--tinta);display:flex;flex-direction:column;overflow:hidden}
.cab{padding:14px 16px;border-bottom:2px solid var(--tinta)}
.cab h1{font-size:1.15rem;letter-spacing:1px}.cab .sub{font-size:.72rem;color:var(--gris);font-style:italic}
.pulso{height:20px;width:100%;margin-top:6px}.pulso polyline{fill:none;stroke:var(--verde);stroke-width:2;stroke-dasharray:400;stroke-dashoffset:400;animation:l 3s linear infinite}@keyframes l{to{stroke-dashoffset:0}}
.nav{overflow-y:auto;flex:1;padding:8px}.grupo{margin-bottom:6px}.grupo>.tit{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--gris);padding:8px 8px 4px;font-weight:700}
.item{padding:7px 10px;border-radius:7px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:8px;transition:background .1s}.item:hover{background:var(--crema)}.item.activo{background:#dbeafe;color:var(--azul-osc);font-weight:600}.item .ico{width:18px;text-align:center;flex-shrink:0}.item .badge{margin-left:auto;font-size:.62rem;background:#dcfce7;color:var(--verde-osc);padding:1px 6px;border-radius:10px;font-weight:700}.item .badge.q{background:#fef3c7;color:#92400e}.subitem{padding-left:26px;font-size:.8rem}
main{flex:1;overflow-y:auto;padding:0}.top{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--linea);padding:10px 24px;z-index:7}.topline{display:flex;align-items:center;gap:12px}.top .ruta{font-size:.8rem;color:var(--gris);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.filtros{display:none;gap:6px;flex-wrap:wrap;margin-top:9px}.filtros.visible{display:flex}.filtro{border:1px solid var(--linea);background:#fff;border-radius:999px;padding:5px 9px;font-size:.72rem;cursor:pointer}.filtro:hover,.filtro.activo{border-color:var(--tinta);font-weight:700}.filtro[data-tipo="hablemos-claro"].activo{background:var(--azulc);color:var(--azul-osc)}.filtro[data-tipo="en-la-calle"].activo{background:var(--verdec);color:var(--verde-osc)}.filtro[data-tipo="lo-que-cae"].activo{background:var(--amarilloc);color:#92400e}.filtro[data-tipo="perla-vigor"].activo{background:var(--moradoc);color:#6b21a8}.filtro[data-tipo="trampa"].activo{background:var(--rojoc);color:#991b1b}.filtro[data-tipo="ha-caido"].activo{background:var(--naranjac);color:#9a3412}.filtro[data-tipo="visual"].activo{background:var(--visualc);color:#334155}
.cuerpo{padding:24px 32px;max-width:940px}.bienvenida{text-align:center;padding:60px 20px;color:var(--gris)}.bienvenida h2{font-size:1.6rem;color:var(--tinta);margin-bottom:10px}.stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:24px}.stat{background:#fff;border:1.5px solid var(--linea);border-radius:10px;padding:14px 20px;min-width:120px}.stat b{display:block;font-size:1.8rem;color:var(--azul)}.stat span{font-size:.72rem;color:var(--gris);text-transform:uppercase;letter-spacing:.5px}
.md h1{font-size:1.7rem;border-bottom:3px solid var(--azul);padding-bottom:6px;margin:14px 0 10px}.md h2{font-size:1.35rem;color:var(--azul-osc);margin:20px 0 8px}.md h3{font-size:1.12rem;margin:14px 0 6px}.md p,.md li{line-height:1.55}.md ul,.md ol{margin:8px 0 12px 24px}.md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:.9rem}.md th{background:#dbeafe;text-align:left}.md th,.md td{border:1px solid var(--linea);padding:7px 10px}.md blockquote{background:#f8fafc;border-left:5px solid #94a3b8;padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0}.md code,.md pre{background:var(--crema);border-radius:6px;font-size:.85rem}.md pre{padding:12px;overflow-x:auto;border:1px solid var(--linea)}.md img{max-width:100%;height:auto;border:1px solid var(--linea);border-radius:10px;margin:10px 0}.md hr{border:none;border-top:1px solid var(--linea);margin:18px 0}
.vig-box{width:100%;border-left:6px solid;padding:11px 14px 12px;border-radius:0 10px 10px 0;margin:14px 0;box-shadow:0 1px 0 rgba(15,23,42,.04)}.vig-box .vig-etiqueta{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.55px;margin-bottom:5px}.vig-box>:last-child{margin-bottom:0}.vig-hablemos-claro{background:var(--azulc);border-color:var(--azul)}.vig-hablemos-claro .vig-etiqueta{color:var(--azul-osc)}.vig-en-la-calle{background:var(--verdec);border-color:var(--verde)}.vig-en-la-calle .vig-etiqueta{color:var(--verde-osc)}.vig-lo-que-cae{background:var(--amarilloc);border-color:#f59e0b}.vig-lo-que-cae .vig-etiqueta{color:#92400e}.vig-perla-vigor{background:var(--moradoc);border-color:var(--morado)}.vig-perla-vigor .vig-etiqueta{color:#6b21a8}.vig-trampa{background:var(--rojoc);border-color:var(--rojo)}.vig-trampa .vig-etiqueta{color:#991b1b}.vig-ha-caido{background:var(--naranjac);border-color:var(--naranja)}.vig-ha-caido .vig-etiqueta{color:#9a3412}.vig-visual{background:var(--visualc);border-color:var(--visual)}.vig-visual.recurso-pendiente{display:none}.vig-visual .vig-etiqueta{color:#334155}.vig-visual.disponible{background:#fff}.vig-visual img{display:block;margin:10px auto 2px}
.md.modo-solo>*{display:none}.md.modo-solo>h1,.md.modo-solo>h2,.md.modo-solo>h3,.md.modo-solo>.vig-visible{display:block}.md.modo-solo>.vig-box:not(.vig-visible){display:none}
.cargando{padding:40px;text-align:center;color:var(--gris)}.preg{background:#fff;border:1.5px solid var(--linea);border-radius:10px;padding:14px 16px;margin-bottom:12px}.preg .num{font-size:.7rem;color:var(--gris);font-weight:700}.preg .enun{font-weight:600;margin:6px 0 10px}.opt{padding:6px 10px;border:1px solid var(--linea);border-radius:6px;margin-bottom:5px;font-size:.9rem;cursor:pointer}.opt:hover{background:var(--crema)}.opt.ok{background:#dcfce7;border-color:var(--verde)}.expl{font-size:.82rem;color:var(--gris);margin-top:8px;padding-top:8px;border-top:1px dashed var(--linea)}.tag{display:inline-block;font-size:.65rem;padding:1px 7px;border-radius:10px;margin-right:4px;background:#dbeafe;color:var(--azul-osc)}.aviso{background:#fef3c7;color:#92400e;padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:14px}.json{background:var(--tinta);color:#e2e8f0;padding:16px;border-radius:8px;font-size:.78rem;overflow-x:auto;font-family:monospace;white-space:pre-wrap}
.tema-portada h2,.materiales-cab h2{font-size:1.65rem;margin-bottom:6px}.tema-portada>p,.materiales-cab>p{color:var(--gris);line-height:1.5}.acciones-tema{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:22px}.accion-tema{background:#fff;border:1.5px solid var(--linea);border-radius:13px;padding:18px;text-align:left;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s}.accion-tema:hover{transform:translateY(-2px);border-color:var(--azul);box-shadow:0 8px 22px rgba(15,23,42,.08)}.accion-tema .icono{font-size:1.7rem;display:block;margin-bottom:10px}.accion-tema b{display:block;font-size:1.03rem;margin-bottom:5px}.accion-tema span{font-size:.8rem;color:var(--gris);line-height:1.4;display:block}.elige-version{display:flex;gap:8px;margin-top:10px}.elige-version button,.boton-recurso{border:0;border-radius:7px;background:var(--tinta);color:#fff;padding:7px 10px;font-weight:700;cursor:pointer}.elige-version button:hover,.boton-recurso:hover{background:var(--azul-osc)}
.material-toolbar{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0}.material-filtro{border:1px solid var(--linea);background:#fff;border-radius:999px;padding:7px 11px;cursor:pointer;font-size:.78rem}.material-filtro.activo,.material-filtro:hover{border-color:var(--azul);background:var(--azulc);color:var(--azul-osc);font-weight:700}.grid-recursos{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.recurso{background:#fff;border:1.5px solid var(--linea);border-radius:12px;padding:15px;display:flex;gap:12px;align-items:flex-start}.recurso-icono{font-size:1.6rem;line-height:1}.recurso-contenido{min-width:0;flex:1}.recurso h3{font-size:.96rem;margin:0 0 5px}.recurso-meta{font-size:.72rem;color:var(--gris);margin-bottom:9px}.estado-recurso{display:inline-block;font-size:.62rem;padding:2px 7px;border-radius:999px;background:#f1f5f9;color:#475569;margin-left:5px}.estado-recurso.publicado{background:#dcfce7;color:#14532d}.estado-recurso.revision{background:#fef3c7;color:#92400e}.sin-material{background:#fff;border:1.5px dashed var(--linea);border-radius:12px;padding:28px;text-align:center;color:var(--gris)}
.tira-recursos{background:#eef6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 12px;margin:8px 0 14px}.tira-recursos b{display:block;font-size:.74rem;color:var(--azul-osc);margin-bottom:7px}.tira-recursos-lista{display:flex;gap:7px;flex-wrap:wrap}.acceso-contextual{border:1px solid #93c5fd;background:#fff;color:var(--azul-osc);border-radius:999px;padding:5px 9px;font-size:.73rem;cursor:pointer}.acceso-contextual:hover{background:#dbeafe}
.visor{position:fixed;inset:0;background:rgba(15,23,42,.78);z-index:100;display:none;align-items:center;justify-content:center;padding:22px}.visor.abierto{display:flex}.visor-panel{background:#fff;width:min(1100px,96vw);height:min(760px,92vh);border-radius:13px;overflow:hidden;display:flex;flex-direction:column}.visor-cab{display:flex;align-items:center;gap:12px;padding:10px 13px;border-bottom:1px solid var(--linea)}.visor-cab b{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.visor-cab a,.visor-cab button{border:0;background:var(--crema);color:var(--tinta);border-radius:7px;padding:7px 10px;text-decoration:none;cursor:pointer;font-weight:700}.visor iframe{width:100%;height:100%;border:0;background:#fff}
@media(max-width:800px){body{display:block;overflow:auto}body>aside{width:100%;position:relative;height:auto;max-height:42vh;border-right:0;border-bottom:2px solid var(--tinta)}main{height:auto;overflow:visible}.top{position:sticky}.cuerpo{padding:18px 16px}.filtro{font-size:.68rem}}
@media(max-width:800px){.acciones-tema,.grid-recursos{grid-template-columns:1fr}.visor{padding:6px}.visor-panel{width:100%;height:96vh}}
</style>
</head>
<body>
<aside>
  <div class="cab"><h1>🛡️ EXPLORADOR</h1><div class="sub">Academia En Vigor · navegación interna</div><svg class="pulso" viewBox="0 0 340 20" preserveAspectRatio="none"><polyline points="0,12 90,12 105,4 118,17 130,2 140,17 150,12 340,12"/></svg></div>
  <div class="nav" id="nav"><div class="cargando">Cargando índice…</div></div>
</aside>
<main>
  <div class="top"><div class="topline"><span class="ruta" id="ruta">Selecciona un elemento del panel</span></div><div class="filtros" id="filtros"></div></div>
  <div class="cuerpo" id="cuerpo"><div class="bienvenida"><h2>Explorador de contenido</h2><p>Navega por el temario, los bancos de preguntas y los exámenes oficiales.<br>Todo se lee en directo desde el repositorio.</p><div class="stats" id="stats"></div></div></div>
</main>
<div class="visor" id="visor" role="dialog" aria-modal="true" aria-labelledby="visor-titulo">
  <div class="visor-panel">
    <div class="visor-cab"><b id="visor-titulo">Material</b><a id="visor-externo" href="#" target="_blank" rel="noopener">Abrir aparte</a><button type="button" onclick="cerrarVisor()" aria-label="Cerrar">✕</button></div>
    <iframe id="visor-frame" title="Visor de material" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
</div>
<script>
const RAW='https://raw.githubusercontent.com/academiaenvigor/academia-en-vigor/main/';
const OP='policia-nacional';
const TEMAS={1:{slug:'tema-01-el-derecho-la-persona-y-la-nacionalidad',titulo:'El Derecho, la persona y la nacionalidad'},3:{slug:'tema-03-constitucion-espanola-ii',titulo:'Constitución Española II'}};
const EXAMENES=[['P33-XXXIII',33],['P34-XXXIV',34],['P35-XXXV',35],['P36-XXXVI',36],['P37-XXXVII',37],['P38-XXXVIII',38],['P39-XXXIX',39],['P40-XL',40],['P41-XLI',41],['P42-XLII',42]];
const VIGOR={
  'hablemos-claro':{icono:'💬',etiqueta:'Hablemos claro'},'en-la-calle':{icono:'👮',etiqueta:'En la calle'},
  'lo-que-cae':{icono:'🎯',etiqueta:'Lo que cae'},'perla-vigor':{icono:'💎',etiqueta:'Perla VIGOR'},
  'trampa':{icono:'⚠️',etiqueta:'Trampa / no confundas'},'ha-caido':{icono:'📌',etiqueta:'Ha caído'},
  'visual':{icono:'🎨',etiqueta:'Recurso visual'}
};
const MATERIAL={
  audios:{icono:'🎧',etiqueta:'Audios'},videos:{icono:'🎬',etiqueta:'Vídeos'},
  presentaciones:{icono:'📊',etiqueta:'Presentaciones'},infografias:{icono:'🖼️',etiqueta:'Infografías / resúmenes'}
};
let filtroActivo='todos';
function construirNav(){const nav=document.getElementById('nav');let h='<div class="grupo"><div class="tit">📖 Temas (VIGOR)</div>';for(const[n,t]of Object.entries(TEMAS)){h+=`<div class="item" onclick="verPortadaTema(${n},this)"><span class="ico">🛡️</span> Tema ${n} · ${t.titulo}</div><div class="item subitem" onclick="verTema(${n},'atestado',this)"><span class="ico">📚</span> El Atestado</div><div class="item subitem" onclick="verTema(${n},'parte',this)"><span class="ico">📄</span> El Parte</div><div class="item subitem" onclick="verMaterialesTema(${n},'todos',this)"><span class="ico">🎓</span> Materiales</div><div class="item subitem" onclick="verBanco(${n},this)"><span class="ico">🎯</span> Tests</div><div class="item subitem" onclick="verMaster(${n},this)"><span class="ico">🧠</span> master.md (fuente)</div>`}h+='</div><div class="grupo"><div class="tit">🎓 Material por tipo</div>';for(const[k,v]of Object.entries(MATERIAL))h+=`<div class="item" onclick="verBiblioteca('${k}',this)"><span class="ico">${v.icono}</span> ${v.etiqueta}</div>`;h+='</div><div class="grupo"><div class="tit">📅 Exámenes oficiales</div>';for(const[id,n]of EXAMENES)h+=`<div class="item" onclick="verExamen('${id}',this)"><span class="ico">📋</span> Promoción ${n} <span class="badge q">oficial</span></div>`;h+='</div><div class="grupo"><div class="tit">⚙️ Editorial</div><div class="item" onclick="verMd(\'editorial/00-codigo-vigor.md\',\'Código VIGOR\',this)"><span class="ico">📜</span> Código VIGOR</div><div class="item" onclick="verMd(\'editorial/01-manual-editorial.md\',\'Manual editorial\',this)"><span class="ico">🎨</span> Manual editorial</div><div class="item" onclick="verMd(\'README.md\',\'README\',this)"><span class="ico">📄</span> README</div></div>';nav.innerHTML=h;document.getElementById('stats').innerHTML=`<div class="stat"><b>${Object.keys(TEMAS).length}</b><span>temas VIGOR</span></div><div class="stat"><b>${EXAMENES.length}</b><span>exámenes oficiales</span></div><div class="stat"><b>45</b><span>temas totales</span></div>`}
function construirFiltros(){const f=document.getElementById('filtros');f.innerHTML=`<button class="filtro activo" data-tipo="todos" onclick="filtrar('todos',this)">Todo</button>`+Object.entries(VIGOR).map(([k,v])=>`<button class="filtro" data-tipo="${k}" onclick="filtrar('${k}',this)">${v.icono} ${v.etiqueta}</button>`).join('')}
function activar(el){document.querySelectorAll('.item').forEach(i=>i.classList.remove('activo'));if(el)el.classList.add('activo')}function ruta(t){document.getElementById('ruta').textContent=t}function cargando(){ocultarFiltros();document.getElementById('cuerpo').innerHTML='<div class="cargando">Cargando…</div>'}function ocultarFiltros(){document.getElementById('filtros').classList.remove('visible')}function mostrarFiltros(){document.getElementById('filtros').classList.add('visible')}
async function fetchTexto(path){const r=await fetch(RAW+path);if(!r.ok)throw new Error('No encontrado: '+path);return await r.text()}
async function fetchJson(path){return JSON.parse(await fetchTexto(path))}
function normalizarBloquesAntiguos(md){const reglas=[[/^>\s*\*\*Hablemos claro:\*\*\s*(.*)$/gmi,'hablemos-claro'],[/^>\s*\*\*En la calle:\*\*\s*(.*)$/gmi,'en-la-calle'],[/^>\s*\*\*Lo que cae:\*\*\s*(.*)$/gmi,'lo-que-cae'],[/^>\s*\*\*Perla VIGOR:\*\*\s*(.*)$/gmi,'perla-vigor'],[/^>\s*\*\*(?:Trampa|No confundas):\*\*\s*(.*)$/gmi,'trampa'],[/^>\s*🎨\s*\*\*(Referencia visual prevista|Mapa general previsto):\*\*\s*(.*)$/gmi,'visual']];for(const[re,tipo]of reglas){md=md.replace(re,(m,a,b)=>{const texto=tipo==='visual'?`**${a}:** ${b}`:a;return`:::${tipo}\n${texto}\n:::`})}return md}
function markdownAHtml(md){md=normalizarBloquesAntiguos(md);const cajas=[];md=md.replace(/^:::(hablemos-claro|en-la-calle|lo-que-cae|perla-vigor|trampa|ha-caido|visual)\s*\n([\s\S]*?)^:::\s*$/gm,(m,tipo,cuerpo)=>{const info=VIGOR[tipo];const interior=marked.parse(cuerpo.trim());const html=`<aside class="vig-box vig-${tipo}" data-vig="${tipo}"><div class="vig-etiqueta">${info.icono} ${info.etiqueta}</div>${interior}</aside>`;const token=`AEVCAJA${cajas.length}FIN`;cajas.push(html);return token});let html=marked.parse(md);cajas.forEach((caja,i)=>{html=html.replace(`<p>AEVCAJA${i}FIN</p>`,caja).replace(`AEVCAJA${i}FIN`,caja)});return corregirRutas(html)}
function corregirRutas(html){return html.replace(/(?:\.\.\/)+assets\//g,RAW+'assets/').replace(/(?:\.\.\/)+img\//g,RAW+'img/')}
function insertarMarkdown(md,n,aviso=''){filtroActivo='todos';document.querySelectorAll('.filtro').forEach(b=>b.classList.toggle('activo',b.dataset.tipo==='todos'));document.getElementById('cuerpo').innerHTML=`${aviso}<div class="md">${markdownAHtml(md)}</div>`;mostrarFiltros();resolverVisuales(n);document.querySelector('main').scrollTop=0}
function filtrar(tipo,boton){filtroActivo=tipo;document.querySelectorAll('.filtro').forEach(b=>b.classList.toggle('activo',b===boton));const md=document.querySelector('.md');if(!md)return;md.querySelectorAll('.vig-box').forEach(b=>b.classList.toggle('vig-visible',tipo!=='todos'&&b.dataset.vig===tipo));md.classList.toggle('modo-solo',tipo!=='todos')}
function resolverVisuales(n){if(!n)return;document.querySelectorAll('.vig-visual code').forEach(code=>{const nombre=code.textContent.trim();if(!/\.(png|jpe?g|webp|svg)$/i.test(nombre))return;const url=`${RAW}assets/${OP}/tema-${String(n).padStart(2,'0')}/${encodeURIComponent(nombre)}`;const box=code.closest('.vig-visual');if(!box||box.querySelector(`img[data-auto="${nombre}"]`))return;box.classList.add('recurso-pendiente');const img=new Image();img.dataset.auto=nombre;img.alt=nombre.replace(/[-_]/g,' ').replace(/\.[^.]+$/,'');img.onload=()=>{box.appendChild(img);box.classList.remove('recurso-pendiente');box.classList.add('disponible');const p=code.closest('p');if(p){const strong=p.querySelector('strong');if(strong)strong.textContent='Recurso visual:';code.remove()}};img.onerror=()=>{box.classList.add('recurso-pendiente')};img.src=url})}
function verPortadaTema(n,el){activar(el);ocultarFiltros();ruta(`Tema ${n} · ${TEMAS[n].titulo}`);document.getElementById('cuerpo').innerHTML=`<section class="tema-portada"><h2>Tema ${n} · ${TEMAS[n].titulo}</h2><p>Elige cómo quieres trabajar este tema. Los materiales también aparecerán junto al punto concreto de lectura al que pertenecen.</p><div class="acciones-tema"><article class="accion-tema"><span class="icono">📖</span><b>Estudiar</b><span>El Parte para memorizar y El Atestado para comprender en profundidad.</span><div class="elige-version"><button onclick="verTema(${n},'parte')">El Parte</button><button onclick="verTema(${n},'atestado')">El Atestado</button></div></article><article class="accion-tema" onclick="verMaterialesTema(${n})"><span class="icono">🎓</span><b>Materiales</b><span>Audios, vídeos, presentaciones e infografías, ordenados por tipo y bloque.</span></article><article class="accion-tema" onclick="verBanco(${n})"><span class="icono">🎯</span><b>Tests</b><span>Comprueba el aprendizaje del tema y localiza los puntos que necesitan otra vuelta.</span></article></div></section>`;document.querySelector('main').scrollTop=0}
async function verTema(n,version,el){activar(el);cargando();const path=`temas/${OP}/${version}/${TEMAS[n].slug}.md`;ruta(path);try{insertarMarkdown(await fetchTexto(path),n);await inyectarRecursosContextuales(n)}catch(e){document.getElementById('cuerpo').innerHTML=`<div class="aviso">No se pudo cargar: ${path}</div>`}}
async function verMaster(n,el){activar(el);cargando();const path=`conocimiento/${OP}/tema-${String(n).padStart(2,'0')}/master.md`;ruta(path);try{insertarMarkdown(await fetchTexto(path),n,'<div class="aviso">🧠 Fuente única del tema. De aquí se generan El Parte y El Atestado.</div>')}catch(e){document.getElementById('cuerpo').innerHTML=`<div class="aviso">No disponible: ${path}</div>`}}
async function verBanco(n,el){activar(el);cargando();const path=`banco-preguntas/${OP}/tema-${String(n).padStart(2,'0')}/preguntas.jsonl`;ruta(path);try{const txt=await fetchTexto(path);const preguntas=txt.trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));let h=`<h2 style="margin-bottom:12px">🎯 Banco · Tema ${n} <span style="font-size:.9rem;color:var(--gris)">(${preguntas.length} preguntas)</span></h2>`;preguntas.slice(0,40).forEach((p,i)=>h+=pintarPregunta(p,i+1));if(preguntas.length>40)h+=`<p style="color:var(--gris);text-align:center">… y ${preguntas.length-40} más</p>`;document.getElementById('cuerpo').innerHTML=h}catch(e){document.getElementById('cuerpo').innerHTML=`<div class="aviso">No disponible: ${path}</div>`}}
function manifestMateriales(n){return`materiales-didacticos/${OP}/tema-${String(n).padStart(2,'0')}/manifest.json`}
function urlRecurso(r){return(r.storage&&r.storage.url)||''}
function visibleEnBiblioteca(r){return r.status!=='retired'&&Boolean(urlRecurso(r))}
function claseEstado(estado){if(estado==='published'||estado==='approved_internal')return'publicado';if(estado==='pending_review')return'revision';return''}
function etiquetaEstado(estado){return{planned:'Planificado',in_production:'En producción',pending_review:'Pendiente de revisión',approved_internal:'Revisado',published:'Publicado',retired:'Retirado'}[estado]||estado||'Sin estado'}
function metaRecurso(r){const partes=[];if(r.topic_number)partes.push(`Tema ${r.topic_number}`);if(r.scope==='tema')partes.push('Tema completo');else if(r.part_number)partes.push(`Parte ${r.part_number}`);if(r.blocks&&r.blocks.length){const primero=r.blocks[0],ultimo=r.blocks[r.blocks.length-1];partes.push(r.blocks.length===1?`Bloque ${primero}`:`Bloques ${primero}–${ultimo}`)}if(r.duration_seconds)partes.push(`${Math.max(1,Math.round(r.duration_seconds/60))} min`);return partes.join(' · ')}
function tarjetaRecurso(r){const tipo=MATERIAL[r.category]||{icono:'📎',etiqueta:'Material'};const url=urlRecurso(r);return`<article class="recurso"><div class="recurso-icono">${tipo.icono}</div><div class="recurso-contenido"><h3>${r.title||tipo.etiqueta}<span class="estado-recurso ${claseEstado(r.status)}">${etiquetaEstado(r.status)}</span></h3><div class="recurso-meta">${metaRecurso(r)}</div><button class="boton-recurso" onclick="abrirRecurso(decodeURIComponent('${encodeURIComponent(url)}'),decodeURIComponent('${encodeURIComponent(r.title||tipo.etiqueta)}'))">Abrir material</button></div></article>`}
function barraMateriales(n,tipo){return`<div class="material-toolbar"><button class="material-filtro ${tipo==='todos'?'activo':''}" onclick="verMaterialesTema(${n},'todos')">Todo</button>`+Object.entries(MATERIAL).map(([k,v])=>`<button class="material-filtro ${tipo===k?'activo':''}" onclick="verMaterialesTema(${n},'${k}')">${v.icono} ${v.etiqueta}</button>`).join('')+'</div>'}
async function verMaterialesTema(n,tipo='todos',el){activar(el);cargando();ocultarFiltros();ruta(`Tema ${n} · Materiales${tipo!=='todos'?' · '+MATERIAL[tipo].etiqueta:''}`);try{const data=await fetchJson(manifestMateriales(n));let recursos=(data.resources||[]).filter(visibleEnBiblioteca);if(tipo!=='todos')recursos=recursos.filter(r=>r.category===tipo);const grid=recursos.length?`<div class="grid-recursos">${recursos.map(tarjetaRecurso).join('')}</div>`:'<div class="sin-material">Todavía no hay archivos disponibles en esta categoría. Al añadir una URL al manifiesto aparecerán aquí automáticamente.</div>';document.getElementById('cuerpo').innerHTML=`<section class="materiales-cab"><h2>🎓 Materiales · Tema ${n}</h2><p>El mismo catálogo alimenta esta biblioteca y los accesos que aparecen durante la lectura del temario.</p>${barraMateriales(n,tipo)}${grid}</section>`;document.querySelector('main').scrollTop=0}catch(e){document.getElementById('cuerpo').innerHTML=`<div class="aviso">No se pudo cargar el catálogo: ${manifestMateriales(n)}</div>`}}
async function verBiblioteca(tipo,el){activar(el);cargando();ocultarFiltros();ruta(`Materiales · ${MATERIAL[tipo].etiqueta}`);try{const lotes=await Promise.all(Object.keys(TEMAS).map(async n=>{try{const d=await fetchJson(manifestMateriales(n));return(d.resources||[]).map(r=>({...r,topic_number:Number(n)}))}catch(e){return[]}}));const recursos=lotes.flat().filter(r=>r.category===tipo&&visibleEnBiblioteca(r));document.getElementById('cuerpo').innerHTML=`<section class="materiales-cab"><h2>${MATERIAL[tipo].icono} ${MATERIAL[tipo].etiqueta}</h2><p>Todos los recursos disponibles de este tipo, agrupados desde los manifiestos de cada tema.</p>${recursos.length?`<div class="grid-recursos" style="margin-top:18px">${recursos.map(tarjetaRecurso).join('')}</div>`:'<div class="sin-material" style="margin-top:18px">Todavía no hay archivos disponibles de este tipo.</div>'}</section>`}catch(e){document.getElementById('cuerpo').innerHTML='<div class="aviso">No se pudo cargar la biblioteca de materiales.</div>'}}
function hayTiraCompilada(h2){let nodo=h2.nextElementSibling;while(nodo&&nodo.tagName!=='H2'&&nodo.tagName!=='H1'){if((nodo.textContent||'').includes('Material de este punto'))return true;nodo=nodo.nextElementSibling}return false}
async function inyectarRecursosContextuales(n){let data;try{data=await fetchJson(manifestMateriales(n))}catch(e){return}const recursos=(data.resources||[]).filter(visibleEnBiblioteca);const md=document.querySelector('.md');if(!md||!recursos.length)return;md.querySelectorAll('h2').forEach(h2=>{const m=(h2.textContent||'').match(/^(\d{1,2})\./);if(!m||hayTiraCompilada(h2))return;const bloque=m[1].padStart(2,'0');const propios=recursos.filter(r=>{const anclas=(r.anchor_blocks&&r.anchor_blocks.length?r.anchor_blocks:r.blocks)||[];return anclas.map(String).map(x=>x.padStart(2,'0')).includes(bloque)});if(!propios.length)return;const box=document.createElement('aside');box.className='tira-recursos';box.innerHTML=`<b>Material de esta parte</b><div class="tira-recursos-lista">${propios.map(r=>{const t=MATERIAL[r.category]||{icono:'📎'};return`<button class="acceso-contextual" onclick="abrirRecurso(decodeURIComponent('${encodeURIComponent(urlRecurso(r))}'),decodeURIComponent('${encodeURIComponent(r.title||'Material')}'))">${t.icono} ${r.title}</button>`}).join('')}</div>`;h2.insertAdjacentElement('afterend',box)})}
function urlVistaPrevia(url){let m;if((m=url.match(/drive\.google\.com\/file\/d\/([^/]+)/)))return`https://drive.google.com/file/d/${m[1]}/preview`;if((m=url.match(/[?&]id=([^&]+)/)))return`https://drive.google.com/file/d/${m[1]}/preview`;if((m=url.match(/docs\.google\.com\/(presentation|document|spreadsheets)\/d\/([^/]+)/)))return`https://docs.google.com/${m[1]}/d/${m[2]}/preview`;return url}
function abrirRecurso(url,titulo){if(!url)return;document.getElementById('visor-titulo').textContent=titulo||'Material';document.getElementById('visor-externo').href=url;document.getElementById('visor-frame').src=urlVistaPrevia(url);document.getElementById('visor').classList.add('abierto');document.body.style.overflow='hidden'}
function cerrarVisor(){document.getElementById('visor').classList.remove('abierto');document.getElementById('visor-frame').src='about:blank';document.body.style.overflow=''}
document.getElementById('visor').addEventListener('click',e=>{if(e.target.id==='visor')cerrarVisor()});document.addEventListener('keydown',e=>{if(e.key==='Escape')cerrarVisor()})
async function verExamen(id,el){activar(el);cargando();const path=`banco-preguntas/${OP}/oficiales/${id}/preguntas.jsonl`;ruta(path);try{const meta=JSON.parse(await fetchTexto(`banco-preguntas/${OP}/oficiales/${id}/metadata.json`));const txt=await fetchTexto(path);const preguntas=txt.trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));let aviso=(meta.verification_status==='quarantine'||meta.counts_for_ha_caido===false)?'<div class="aviso">⚠️ Examen en cuarentena / respuestas sin cotejar contra plantilla oficial. No cuenta para «Ha caído».</div>':'';let h=`<h2>📋 Promoción ${meta.promotion_number} (${meta.promotion_roman}) · Modelo ${meta.model} · ${meta.series_year}</h2><p style="color:var(--gris);margin:6px 0 14px">${meta.normalised_questions} preguntas · estado: ${meta.verification_status}</p>${aviso}`;preguntas.slice(0,30).forEach(p=>h+=pintarPreguntaOficial(p));if(preguntas.length>30)h+=`<p style="color:var(--gris);text-align:center">… y ${preguntas.length-30} más</p>`;document.getElementById('cuerpo').innerHTML=h}catch(e){document.getElementById('cuerpo').innerHTML=`<div class="aviso">No disponible: ${path}</div>`}}
function pintarPregunta(p,i){const opts=(p.options||[]).map(o=>`<div class="opt${o.id===p.correct_option_id?' ok':''}">${o.text||o.source_label}</div>`).join('');const tags=[p.difficulty,p.type,p.concept].filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join('');return`<div class="preg"><div class="num">Pregunta ${i}</div><div>${tags}</div><div class="enun">${p.prompt||''}</div>${opts}${p.explanation?`<div class="expl">💡 ${p.explanation}</div>`:''}</div>`}
function pintarPreguntaOficial(p){const correcta=p.answer?.proposed_option_id||p.correct_option_id;const opts=(p.options||[]).map(o=>`<div class="opt${o.id===correcta?' ok':''}"><b>${o.source_label})</b> ${o.text}</div>`).join('');return`<div class="preg"><div class="num">Pregunta ${p.exam?.question_number||''}</div><div class="enun">${p.prompt||''}</div>${opts}</div>`}
async function verMd(path,titulo,el){activar(el);cargando();ruta(path);try{insertarMarkdown(await fetchTexto(path),null)}catch(e){document.getElementById('cuerpo').innerHTML=`<div class="aviso">No disponible: ${path}</div>`}}
construirNav();construirFiltros();
</script>
</body>
